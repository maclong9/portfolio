name: Build and Deploy Static Site

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write # Grant write access to repository contents

jobs:
  build-and-push:
    runs-on: macos-15
    steps:
      # Check out the repository code
      - uses: actions/checkout@v4
      
      # Set up Swift 6.0
      - name: Setup Swift 6.1
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.1"
      
      # Verify the Swift version
      - name: Verify Swift Version
        run: swift --version
      
      # Build the project
      - name: Build
        run: swift build -v
      
      # Run the static site generator
      - name: Generate Site
        run: swift run Portfolio
      
      # Push to static branch (only on push to main)
      - name: Push to static branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git checkout -B static
          rm -rf ./*
          mv .output/* .
          rm -rf .output
          git add .
          git commit -m "release: update static site content"
          git push origin static --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
