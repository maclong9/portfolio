(function() {
    let mobileMenuOpen = false;
    const overlay = document.getElementById('mobile-menu-overlay');
    const container = document.getElementById('mobile-menu-container');
    const menuButton = document.getElementById('mobile-menu-button');
    const closeButton = document.getElementById('mobile-menu-close');

    function toggleMobileMenu(event) {
        if (event) {
            event.stopPropagation();
        }
        if (mobileMenuOpen) {
            closeMobileMenu();
        } else {
            openMobileMenu();
        }
    }

    function openMobileMenu() {
        if (!overlay) return;
        console.log('Opening mobile menu...');
        mobileMenuOpen = true;

        clickOutsideEnabled = false;

            clickOutsideEnabled = true;

        overlay.style.display = 'block';

        overlay.style.transform = 'translateX(100%)'; // Start off-screen
        
        // Force reflow to ensure the element is visible before animating
        overlay.offsetHeight;
        
        // Now slide it in
        overlay.style.transform = 'translateX(-100%)';
        overlay.dataset.mobileMenu = 'open';
        container.dataset.mobileMenuOpen = 'true';

        // Prevent body scroll
        document.body.style.overflow = 'hidden';
    }

    function closeMobileMenu() {
        if (!overlay) return;
        console.log('Closing mobile menu...');
        mobileMenuOpen = false;
        
        // Hide menu with slide-out animation
        overlay.style.transform = 'translateX(100%)';
        overlay.dataset.mobileMenu = 'closed';
        container.dataset.mobileMenuOpen = 'false';
        
        // Restore body scroll
        document.body.style.overflow = '';
        
        // Hide menu after transition by setting display to none
        setTimeout(() => {
            if (!mobileMenuOpen) {
                overlay.style.display = 'none';
            }
        }, 300);
    }

    // Set up event listeners
    if (menuButton) {
        menuButton.addEventListener('click', function(e) {
            e.stopPropagation();
            toggleMobileMenu(e);
        });
    }
    
    if (closeButton) {
        closeButton.addEventListener('click', closeMobileMenu);
    }
    
    // Close menu when clicking links
    const menuLinks = document.querySelectorAll('[data-mobile-menu-link]');

        link.addEventListener('click', closeMobileMenu);
    });
    
    // Close menu on escape key

        if (e.key === 'Escape' && mobileMenuOpen) {

            closeMobileMenu();
        }

    window.closeMobileMenu = closeMobileMenu;

(function() {
    let isDropdownOpen = false;

    function initThemeDropdown() {
        // Listen for dropdown toggle
        document.addEventListener('click', (e) => {
            const themeToggle = e.target.closest('[data-theme-toggle]');
            if (themeToggle) {
                e.preventDefault();
                toggleDropdown();
                return;
            }

            const themeOption = e.target.closest('[data-theme-option]');
            if (themeOption) {
                e.preventDefault();
                const theme = themeOption.dataset.themeOption;
                setTheme(theme);
                updateDropdownUI();
                closeDropdown();
                return;
            }

            // Close dropdown when clicking outside
            if (isDropdownOpen && !e.target.closest('.theme-dropdown')) {
                closeDropdown();
            }
        });

        // Update UI initially and when theme changes
        updateDropdownUI();
        
        // Listen for theme changes
        const observer = new MutationObserver(() => {
            updateDropdownUI();
        });
        
        observer.observe(document.documentElement, {
            attributes: true,
            attributeFilter: ['data-theme']
        });
    }

    function toggleDropdown() {
        if (isDropdownOpen) {
            closeDropdown();
        } else {
            openDropdown();
        }
    }

    function openDropdown() {
        isDropdownOpen = true;
        const dropdown = document.querySelector('.theme-dropdown-menu');
        if (dropdown) {
            dropdown.classList.remove('hidden');
            // Trigger reflow for animation
            dropdown.offsetHeight;
            dropdown.classList.add('theme-dropdown-menu--open');
        }
    }

    function closeDropdown() {
        isDropdownOpen = false;
        const dropdown = document.querySelector('.theme-dropdown-menu');
        if (dropdown) {
            dropdown.classList.remove('theme-dropdown-menu--open');
            setTimeout(() => {
                if (!isDropdownOpen) {
                    dropdown.classList.add('hidden');
                }
            }, 200); // Match transition duration
        }
    }

    function setTheme(theme) {
        localStorage.setItem('theme', theme);
        updateTheme();
    }

    function updateTheme() {
        const themePreference = localStorage.getItem('theme') || 'system';
        let actualTheme = 'light';

        if (themePreference === 'dark') {
            actualTheme = 'dark';
        } else if (themePreference === 'system') {
            actualTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        document.documentElement.setAttribute('data-theme', actualTheme);
    }

    function updateDropdownUI() {
        const savedTheme = localStorage.getItem('theme') || 'system';
        
        // Update theme toggle button icon
        const toggleIcons = document.querySelectorAll('[data-theme-icon]');
        toggleIcons.forEach(icon => {
            icon.style.display = 'none';
        });
        
        const activeIcon = document.querySelector(`[data-theme-icon="${savedTheme}"]`);
        if (activeIcon) {
            activeIcon.style.display = 'block';
        }

        // Update dropdown options
        const options = document.querySelectorAll('[data-theme-option]');
        options.forEach(option => {
            const isActive = option.dataset.themeOption === savedTheme;
            option.classList.toggle('theme-option--active', isActive);
        });
    }

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initThemeDropdown);
    } else {
        initThemeDropdown();
    }
})();</script></div></div></div></div></div></div></header><script>// Header scroll behavior - hide on scroll down, show on scroll up
(function() {
    function initHeaderScrollBehavior() {
        const header = document.getElementById('main-header');
        if (!header) return;

        // Ensure header is visible initially
        header.style.transform = 'translateY(0)';

        let lastScrollTop = 0;
        let scrollThreshold = 10; // Minimum scroll distance before hiding/showing
        let isScrolling = false;

        function handleScroll() {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;

            // Don't hide header when at the very top
            if (scrollTop <= 0) {
                header.style.transform = 'translateY(0)';
                lastScrollTop = scrollTop;
                return;
            }

            // Only act on significant scroll changes
            if (Math.abs(scrollTop - lastScrollTop) < scrollThreshold) {
                return;
            }

            if (scrollTop > lastScrollTop) {
                // Scrolling down - hide header
                header.style.transform = 'translateY(-100%)';
            } else {
                // Scrolling up - show header
                header.style.transform = 'translateY(-1px)';
            }

            lastScrollTop = scrollTop;
        }

        // Throttle scroll events for better performance
        function throttledHandleScroll() {
            if (!isScrolling) {
                window.requestAnimationFrame(() => {
                    handleScroll();
                    isScrolling = false;
                });
                isScrolling = true;
            }
        }

        // Add scroll event listener
        window.addEventListener('scroll', throttledHandleScroll, { passive: true });
    }

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initHeaderScrollBehavior);
    } else {
        initHeaderScrollBehavior();
    }

    // Also initialize on window load as backup
    window.addEventListener('load', initHeaderScrollBehavior);
})();</script></div><main class="flex-1 px-4 py-8 pt-28"><div><div class="flex flex-col items-center justify-center text-center px-4"><h1 class="text-9xl font-extrabold mb-4">404</h1><span class="text-3xl md:text-4xl font-semibold mb-6">Page Not Found</span><span class="mb-8 max-w-md text-balance">Whoops, unfortunately that page either no longer or never existed in the first place.</span><a href="/" class="font-semibold py-3 px-6 transition duration-200 underline">Head back home?</a></div></div></main><footer class="bg-white dark:bg-zinc-800 border-t border-zinc-200 dark:border-zinc-700 px-4 py-6 space-y-2 grid place-items-center"><div class="flex items-center space-x-2"><a href="/posts" class="p-2 text-zinc-500 hover:text-zinc-700 dark:text-zinc-400 dark:hover:text-zinc-200 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-700 transition-colors cursor-pointer"><i data-lucide="file-text" class="w-5 h-5"></i></a><a href="mailto:hello@maclong.uk" class="p-2 text-zinc-500 hover:text-zinc-700 dark:text-zinc-400 dark:hover:text-zinc-200 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-700 transition-colors cursor-pointer"><i data-lucide="mail" class="w-5 h-5"></i></a><a href="https://github.com/maclong9" class="p-2 text-zinc-500 hover:text-zinc-700 dark:text-zinc-400 dark:hover:text-zinc-200 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-700 transition-colors cursor-pointer" target="_blank" rel="noreferrer"><i data-lucide="github" class="w-5 h-5"></i></a></div><div class="text-zinc-500 dark:text-zinc-400 text-sm"><span>© 2025 </span><a href="https://maclong.uk" class="hover:text-teal-600 dark:hover:text-teal-400 transition-colors">Mac Long</a><span>.</span></div></footer></div></body><script src="/public/js/icons.js"></script></html>
